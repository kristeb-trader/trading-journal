<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar íconos PWA — NQ Journal</title>
  <style>
    body { font-family: system-ui; background: #1a1a18; color: #F4F3EF; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; margin: 0; }
    canvas { border-radius: 22%; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
    button { background: #1D9E75; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #16845f; }
    p { color: #9B9B8E; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h2 style="margin:0">Generador de íconos — NQ Journal</h2>
  <canvas id="preview" width="192" height="192"></canvas>
  <p>Vista previa 192×192. Se generarán también 512×512 y 180×180 (Apple).</p>
  <button id="btnDownload">⬇ Descargar los 3 íconos</button>
  <p id="status"></p>

  <script>
    function drawIcon(size) {
      const canvas = document.createElement('canvas')
      canvas.width = size
      canvas.height = size
      const ctx = canvas.getContext('2d')
      const s = size / 32

      // Fondo redondeado
      const r = size * 0.22
      ctx.beginPath()
      ctx.moveTo(r, 0)
      ctx.lineTo(size - r, 0)
      ctx.arcTo(size, 0, size, r, r)
      ctx.lineTo(size, size - r)
      ctx.arcTo(size, size, size - r, size, r)
      ctx.lineTo(r, size)
      ctx.arcTo(0, size, 0, size - r, r)
      ctx.lineTo(0, r)
      ctx.arcTo(0, 0, r, 0, r)
      ctx.closePath()
      ctx.fillStyle = '#1a1a18'
      ctx.fill()

      // Padding visual
      const p = size * 0.06

      // ── Vela roja (izquierda) ──────────────────────────────────────────
      ctx.strokeStyle = '#E24B4A'
      ctx.lineWidth = 1.5 * s
      ctx.lineCap = 'round'

      ctx.fillStyle = '#E24B4A'
      // Cuerpo
      ctx.fillRect(5*s + p, 7*s + p, 6*s, 11*s)
      // Mechas
      ctx.beginPath()
      ctx.moveTo(8*s + p, 4*s + p); ctx.lineTo(8*s + p, 7*s + p)
      ctx.moveTo(8*s + p, 18*s + p); ctx.lineTo(8*s + p, 21*s + p)
      ctx.stroke()

      // ── Vela verde 1 (centro) ──────────────────────────────────────────
      ctx.strokeStyle = '#1D9E75'
      ctx.fillStyle = '#1D9E75'

      ctx.fillRect(13*s + p, 10*s + p, 6*s, 13*s)
      ctx.beginPath()
      ctx.moveTo(16*s + p, 6*s + p); ctx.lineTo(16*s + p, 10*s + p)
      ctx.moveTo(16*s + p, 23*s + p); ctx.lineTo(16*s + p, 27*s + p)
      ctx.stroke()

      // ── Vela verde 2 (derecha) ─────────────────────────────────────────
      ctx.fillRect(21*s + p, 11*s + p, 6*s, 10*s)
      ctx.beginPath()
      ctx.moveTo(24*s + p, 8*s + p); ctx.lineTo(24*s + p, 11*s + p)
      ctx.moveTo(24*s + p, 21*s + p); ctx.lineTo(24*s + p, 25*s + p)
      ctx.stroke()

      return canvas
    }

    // Vista previa
    const preview = document.getElementById('preview')
    const pCtx = preview.getContext('2d')
    pCtx.drawImage(drawIcon(192), 0, 0)

    function downloadCanvas(canvas, filename) {
      return new Promise(resolve => {
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob)
          const a = document.createElement('a')
          a.href = url
          a.download = filename
          document.body.appendChild(a)
          a.click()
          setTimeout(() => { URL.revokeObjectURL(url); a.remove(); resolve() }, 200)
        }, 'image/png')
      })
    }

    document.getElementById('btnDownload').addEventListener('click', async () => {
      const btn = document.getElementById('btnDownload')
      const status = document.getElementById('status')
      btn.disabled = true
      btn.textContent = 'Generando...'

      await downloadCanvas(drawIcon(192), 'icon-192.png')
      await new Promise(r => setTimeout(r, 300))
      await downloadCanvas(drawIcon(512), 'icon-512.png')
      await new Promise(r => setTimeout(r, 300))
      await downloadCanvas(drawIcon(180), 'apple-touch-icon.png')

      btn.textContent = '✅ Descargados'
      status.textContent = 'Mueve los 3 archivos a la carpeta Trading Journal/icons/ y luego elimina este archivo.'
    })
  </script>
</body>
</html>
